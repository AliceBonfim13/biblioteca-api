spring:
  application:
    name: libraryapi
#  profiles:
#    active: production
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DATASOUERCE_URL:jdbc:postgresql://localhost:5432/library}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

logging:
  file:
    name: app.log
  level:
    root: warn
    com:
      alice:
        libraryapi: trace
      org:
        springframework:
          web: debug
          security: trace


springdoc:
  override-with-generic-response: false



---
spring:
  config:
    active:
      on-profile: production
  jpa:
    show-sql: false















